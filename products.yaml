        SDK reference (Command class, CommandFinished class), working-with-sandbox docs (Monitor your sandbox section)'
  notes: 'Firecracker microVM with strong L1-L3 (identical architecture to E2B). L4 firewall with credential brokering (Pro/Enterprise)
