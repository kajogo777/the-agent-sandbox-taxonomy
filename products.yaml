- name: Codex CLI (agent phase)
  portability:
  - linux
  - mac
  layers:
    L1:
      s: 3
      g: 1
      note: macOS Seatbelt + Linux Landlock+seccomp-BPF + Windows AppContainer (experimental); Rust implementation; process
        hardening (prctl, RLIMIT_CORE=0, LD_* stripping)
    L2:
      s: 0
      g: 0
      note: No CPU/memory/disk caps; 1800s worker timeout in multi-agent mode (agent-level, not sandbox-level)
    L3:
      s: 3
      g: 2
      note: 'Three modes: read-only, workspace-write (CWD + /tmp only, default), danger-full-access; Landlock ruleset whitelists
        writable roots; requires git repo. G:2 — Landlock path whitelists are allowlist/blocklist, not content-aware'
    L4:
      s: 3
      g: 1
      note: 'Network disabled by default; seccomp blocks socket, connect, bind syscalls (except AF_UNIX); opt-in via config;
        when enabled: unrestricted (no domain filtering)'
    L5:
      s: 2
      g: 3
      note: 'shell_environment_policy: automatic KEY/SECRET/TOKEN pattern filtering; inherit=none or core options; explicit
        exclude patterns; LD_* stripping; in Codex Cloud: secrets removed before agent phase'
    L6:
      s: 1
      g: 2
      note: 'requirements.toml command prefix rules: pattern-based matching on command arguments with allow/prompt/forbidden
        decisions; MCP server identity allowlisting; admin-enforced (users cannot override). S:1 — command blocklist: prefix
        rules match syntactic command patterns (e.g., pattern=["rm"]) but agents can trivially bypass via libraries, scripts,
        or MCP tools that achieve the same effect without matching the blocked prefix. Guardian subagent (Smart Approvals) is
        an LLM-based risk scorer replacing HITL, not a structured policy engine. G:2 — allowlist/blocklist: command prefix rules
        + MCP server allowlists + allowed sandbox modes/approval policies. 4 approval policies (untrusted, on-request, never,
