- name: Google Agent Sandbox
  portability:
  - cloud-managed
  - k8s
  layers:
    L1:
      s: 4
      g: 1
      note: 'gVisor (default) or Kata Containers (opt-in via runtimeClassName overlay); GKE Autopilot enables gVisor by default;
        AKS supports Kata via kata-vm-isolation. S:4 — Kata Containers provides hardware-isolated microVM per sandbox (dedicated
        kernel via KVM). Scored at strongest available mode per AST rules. WARNING: default is gVisor (S:3, user-space kernel);
        Kata (S:4) requires explicit opt-in via kustomize overlay and nested virtualization support. Standard container runtime
        (no runtimeClassName) is S:2. Consistent with Docker Sandbox scoring pattern (S:4 for strongest mode, WARNING for weaker
        defaults). G:1 — binary: sandbox is either running or not. Evidence: agent-sandbox docs (gVisor/Kata examples), Kata
        blog (Nov 2025), AKS sandbox support (v0.3.10). Open-source kubernetes-sigs/agent-sandbox'
    L2:
      s: 3
      g: 2
      note: 'K8s-native resource limits: cpu_limit, mem_limit, timeout_seconds per executor; WarmPool CRD pre-warms with defined
        budgets. G:2 — per-resource CPU/memory limits are configurable allowlists, not content-aware (G:3)'
    L3:
      s: 3
      g: 2
      note: Ephemeral pod per execution; code injected via ConfigMap, not host mount; gVisor virtualizes FS; optional PVC
    L4:
      s: 3
      g: 2
      note: K8s NetworkPolicy via eBPF (GKE Dataplane v2); default-deny egress; blocks cloud metadata + lateral pod movement;
        VPC Service Controls. Packet-level filter (IP/port/protocol) — cannot inspect HTTP method, URL path, headers, or body;
        G:2 not G:3
    L5:
      s: 3
      g: 3
      note: 'Workload Identity Federation: ephemeral, least-privilege IAM per sandbox; network blocks metadata server; ADK
        PII redaction; OAuth token delegation'
    L6:
      s: 2
      g: 3
      note: ADK callbacks validate model/tool calls before/after execution; in-tool guardrails; Model Armor plugin; Gemini-as-Judge
        via callbacks
    L7:
      s: 2
      g: 2
      note: K8s logging (Cloud Logging on GKE); ADK evaluation and tracing; Cloud Audit Logs; Cloud Monitoring; pod-level
        stdout/stderr
  notes: 'Strong coverage across all layers. With Kata (L1:4), dependent layers are no longer capped. With gVisor default (L1:3),
    layers enforced inside the sandbox are capped at S:3. L4 is kernel-enforced (S:3) but packet-level only (G:2) — cannot
    inspect HTTP content. Complements: MITM proxy for L4 G:3 content-aware filtering'
  last_reviewed: '2026-04-11'
  evidence_level: docs
  reviewed_by: null
