products:
- name: E2B
  portability:
  - cloud
  - kvm
  layers:
    L1:
      s: 4
      g: 1
      note: Firecracker microVM (KVM); dedicated Linux guest kernel; minimal VMM (~50K LOC Rust)
    L2:
      s: 4
      g: 2
      note: Hypervisor-enforced; CPU/memory configurable per template; timeout max 24h; auto-kill on expiry
    L3:
      s: 4
      g: 1
      note: Isolated guest FS; no host exposure; crypto-signed file access; ephemeral on kill
    L4:
      s: 2
      g: 2
      note: 'Host-level domain+CIDR allowlist/denylist via PUT /sandboxes/{id}/network API; SNI inspection (port 443) and Host
        header inspection (port 80) at host-level proxy outside Firecracker microVM; CIDR-based filtering on non-HTTP ports.
        S:2 — software-enforced: host-level proxy outside the VM that the sandbox cannot circumvent (VM boundary prevents bypass);
        not kernel-level packet filtering (iptables/eBPF) but proxy-based SNI matching; reconfigurable by operator at runtime.
        Consistent with Vercel Sandbox L4 (same Firecracker + host proxy architecture). G:2 — domain allowlist/denylist + CIDR
        blocks; not content-aware (no HTTP method/path/body inspection). WARNING: domain filtering only works on ports 80/443;
        other ports fall back to CIDR only. Default: internet enabled. Evidence: API docs (PUT /sandboxes/{sandboxID}/network),
        SDK reference'
    L5:
      s: 1
      g: 1
      note: Env vars injected via SDK; visible inside sandbox; no credential proxy or vault
    L6:
      s: null
      g: null
      note: ''
    L7:
      s: 1
      g: 1
      note: Session-level metrics (CPU/mem/disk); no command-level audit or tamper-evident logging
  notes: 'Gaps: L5 (env vars exposed), L6 (no governance), L7 (session-level only). Complements: Credential proxy, governance
    overlay, external SIEM'
  last_reviewed: '2026-04-11'
  evidence_level: docs
  reviewed_by: null
- name: Daytona
  portability:
  - cloud-managed
  - docker
  layers:
    L1:
      s: 2
      g: 1
      note: Sysbox container runtime (NOT Kata); user-namespace isolation; shared host kernel
    L2:
      s: 2
      g: 2
      note: 'Platform-enforced per-workspace quotas: CPU, memory, storage, bandwidth caps; auto-stop/auto-archive/auto-delete.
        S:2 — platform quotas enforced outside the sandbox (not billing controls — these are actual resource caps per workspace)'
    L3:
      s: 2
      g: 1
      note: Read-only root where applicable; dedicated namespaces; procfs/sysfs partially virtualized. G:1 — conditional read-only
        is binary (on/off), not path-level allowlist/blocklist
    L4:
      s: 2
      g: 2
      note: 'Tiered egress: Tier 1-2 restricted, Tier 3-4 open; networkAllowList (CIDR) and networkBlockAll'
    L5:
      s: 1
      g: 1
      note: API key auth via SDK; session-scoped tokens; TLS 1.2+ in transit; no sandbox-level credential proxy
    L6:
      s: null
      g: null
      note: ''
    L7:
      s: 2
      g: 2
      note: Comprehensive audit logs; 12-month retention, tamper-protected; OTel experimental; SOC 2 Type I
  notes: 'Gaps: L1 (shared kernel), L5 (env var delivery), L6 (no governance). Complements: Kata for L1 upgrade, credential
    proxy for L5, Warden/Leash for L6'
  last_reviewed: null
  evidence_level: docs
  reviewed_by: null
