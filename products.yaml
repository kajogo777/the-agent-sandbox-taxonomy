# Agent Sandbox Taxonomy — Product Scores
# Single source of truth for all product evaluations.
#
# To add a new product: copy an existing entry, fill in scores.
# To update: modify scores/notes, then run: python assets/generate.py
#
# Scoring reference:
#   Strength (S): 0=None, 1=Cooperative, 2=Software-enforced, 3=Kernel-enforced, 4=Structural
#   Granularity (G): 0=None, 1=Binary, 2=Allowlist/Blocklist, 3=Per-resource policy
#   Strength null (~) means the layer is not addressed (shown as — in output)
#   Strength 0 means the layer operates but is unenforced (shown as ○ in output)
#
# Threat coverage:
#   full = ● (primary defense)
#   partial = ◐
#   none = ○
#   For T3, use "partial L●/R○" format to distinguish local vs remote

products:

  # ── CLOUD PLATFORMS ──────────────────────────────────────────────────

  - name: E2B
    category: Cloud Platforms
    portability: [cloud-managed]
    layers:
      L1: { s: 4, g: 1, note: "Firecracker microVM; KVM isolation" }
      L2: { s: 4, g: 2, note: "VM-allocated caps" }
      L3: { s: 4, g: 1, note: "Ephemeral root" }
      L4: { s: 0, g: 0, note: "Not restricted by default; user-configurable" }
      L5: { s: 2, g: 2, note: "Env-var filtering" }
      L6: { s: ~, g: ~, note: "" }
      L7: { s: 2, g: 2, note: "API-level logging" }
    threats:
      T1: partial
      T2: partial
      T3: "partial L●/R○"
      T4: partial
      T5: full
      T6: full
      T7: full
    notes: "Gaps: L4 not default; no L6. Complements: Policy tools for L4–L7"

