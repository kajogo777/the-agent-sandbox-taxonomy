- name: Docker Sandbox
  portability:
  - linux
  - mac
  - docker
  layers:
    L1:
      s: 4
      g: 1
      note: 'Dedicated microVM per sandbox; Apple Virtualization.framework (macOS), Hyper-V (Windows); own Linux kernel +
        private Docker daemon. WARNING: Linux: legacy container mode (shared kernel, S:2)'
    L2:
      s: 4
      g: 1
      note: VM-inherent resource boundary (hypervisor-allocated); not configurable per-sandbox; Docker Desktop settings control
        overall
    L3:
      s: 4
      g: 2
      note: Project-only workspace directory mounted; all other FS ephemeral to VM; no host sensitive paths unless explicitly
        mounted
    L4:
      s: 2
      g: 2
      note: HTTP/HTTPS filtering proxy on host; raw TCP/UDP blocked; domain allow/deny configurable; blocks RFC1918, loopback,
        cloud metadata
    L5:
      s: 4
      g: 2
      note: 'Credential proxy: keys NEVER enter sandbox; proxy auto-injects auth headers for OpenAI, Anthropic, Google, GitHub'
    L6:
      s: null
      g: null
      note: ''
    L7:
      s: 1
      g: 1
      note: Network proxy logs (domain-level HTTP/HTTPS visibility); no command-level audit; no tamper-evident logging
  notes: 'Gaps: L6 (no governance), L7 (network logs only). T1 fully addressed by credential proxy + network filtering. Complements:
    Governance engine (Leash/Warden)'
  last_reviewed: null
  evidence_level: docs
- name: Google Agent Sandbox
  portability:
  - cloud-managed
  - k8s
  layers:
    L1:
      s: 3
      g: 1
      note: gVisor (primary) or Kata (optional); Sentry intercepts all ~340 syscalls; GKE Autopilot enables gVisor by default;
        open-source kubernetes-sigs/agent-sandbox
    L2:
      s: 3
      g: 3
      note: 'K8s-native resource limits: cpu_limit, mem_limit, timeout_seconds per executor; WarmPool CRD pre-warms with defined
        budgets'
    L3:
      s: 3
      g: 2
      note: Ephemeral pod per execution; code injected via ConfigMap, not host mount; gVisor virtualizes FS; optional PVC
    L4:
      s: 3
      g: 2
      note: K8s NetworkPolicy via eBPF (GKE Dataplane v2); default-deny egress; blocks cloud metadata + lateral pod movement;
        VPC Service Controls. Packet-level filter (IP/port/protocol) — cannot inspect HTTP method, URL path, headers, or body;
        G:2 not G:3
    L5:
      s: 3
      g: 3
      note: 'Workload Identity Federation: ephemeral, least-privilege IAM per sandbox; network blocks metadata server; ADK
        PII redaction; OAuth token delegation'
    L6:
      s: 2
      g: 3
      note: ADK callbacks validate model/tool calls before/after execution; in-tool guardrails; Model Armor plugin; Gemini-as-Judge
        via callbacks
    L7:
      s: 2
      g: 2
      note: K8s logging (Cloud Logging on GKE); ADK evaluation and tracing; Cloud Audit Logs; Cloud Monitoring; pod-level
        stdout/stderr
  notes: 'Strong coverage across all layers. gVisor L1 is S:3 (not S:4 hardware isolation), which caps all layers. L4 is kernel-enforced
    (S:3) but packet-level only (G:2) — cannot inspect HTTP content. Complements: Kata for L1:4 upgrade, MITM proxy for L4
    G:3 content-aware filtering'
  last_reviewed: null
  evidence_level: docs
