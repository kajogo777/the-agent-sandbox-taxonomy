- name: Pydantic Monty
  portability:
  - any-os
  layers:
    L1:
      s: 4
      g: 1
      note: 'Custom Rust interpreter; sandboxed code runs as Monty bytecode — no syscalls, no FFI, no eval()/exec(), no __import__(),
        no class definitions, no third-party libraries. S:4 — structural: host OS attack surface does not exist inside the
        interpreter; code cannot invoke syscalls or escape to host runtime; Rust memory safety enforces boundary. The bytecode
        VM is a complete reimplementation — the host kernel, process table, and memory space are architecturally absent. G:1
        — binary: code runs in Monty or not; no per-workload isolation tuning. Evidence: source code (crates/monty/src/run.rs,
        crates/monty/src/lib.rs). WARNING: runs inside host process — a Rust memory safety bug in the ~50K LOC TCB + ruff_python_parser
        dependency could theoretically compromise the host. Different risk profile from hardware-isolated S:4 products (Firecracker,
        Hyper-V) where escape requires a hypervisor CVE'
    L2:
      s: 2
      g: 2
      note: 'ResourceTracker trait with LimitedTracker: tracks allocations, heap memory, execution time, recursion depth,
        large result pre-checks. Time checks rate-limited (every 10th call). S:2 — software-enforced: limits checked by Rust
        runtime at allocation points, statement boundaries, and frame pushes; sandboxed code cannot bypass (checks are in
        Rust, not Python); but host configures limits and could set unlimited. Not S:3 because enforcement is application-level,
        not kernel-level. G:2 — per-resource: max_allocations, max_duration_secs, max_memory, gc_interval, max_recursion_depth
        independently configurable. Evidence: source code (crates/monty/src/resource.rs)'
    L3:
      s: 4
      g: 1
      note: 'OsFunction enum enumerates exactly 17 filesystem operations; every I/O operation yields OsCall to host. No open(),
        no file descriptors, no /proc, no /etc. S:4 — structural: no filesystem exists inside interpreter; pathlib.Path pure
        methods work but any I/O pauses execution and yields to host callback. Enforcement is independent of L1 — the filesystem
        API is architecturally absent from the bytecode VM. G:1 — binary: filesystem access either provided by host callback
        or not; no built-in path allowlist/blocklist (host responsibility). Evidence: source code (crates/monty/src/os.rs)'
    L4:
      s: 4
      g: 1
      note: 'No network capability exists — no socket operations, no HTTP client, no DNS, no network modules. S:4 — structural:
        network stack does not exist inside interpreter; no network device, no socket API. Enforcement is independent of L1
        — the network API is architecturally absent from the bytecode VM. G:1 — binary: network absent by default; only available
        if host provides via external function callbacks. Evidence: source code (exhaustive review of crates/monty/src/modules/)'
    L5:
      s: 4
      g: 1
      note: 'os.getenv() and os.environ yield OsFunction::Getenv/GetEnviron to host; interpreter cannot read host environment
        directly. S:4 — structural: host environment (env vars, credential files, cloud metadata) does not exist inside interpreter;
        host decides what to return for each getenv call. Enforcement is independent of L1 — the env var API yields to host
        regardless of interpreter state. G:1 — binary: credentials either provided by host or not; no built-in credential
        filtering/scoping. Evidence: source code (crates/monty/src/os.rs)'
    L6:
      s: null
      g: null
      note: No action governance. Interpreter executes any valid Python within its subset. No policy engine, no command blocklist,
        no declarative-only mode. Host controls available external functions but no semantic governance of agent actions.
        HITL possible via pause/resume but scored — per AST rules
    L7:
      s: 1
      g: 1
      note: 'PrintWriter captures stdout/stderr via callback; exception tracebacks with full stack traces; serializable snapshots.
        S:1 — cooperative: host must manually instrument logging by wrapping callbacks; no built-in audit log or structured
        event stream. G:1 — binary: logging configured by host or not; no structured per-command audit, no OTel, no tamper-evident
        logging. Evidence: source code (crates/monty/src/io.rs)'
  notes: 'Language-level interpreter sandbox (Rust reimplementation of Python subset) — architecturally unique in AST. Default-deny
    capability model: zero capabilities unless host explicitly grants via callbacks. L3/L4/L5 are S:4 (structural) with enforcement
    independent of L1 — the APIs are architecturally absent from the bytecode VM. G:1 across all layers (host bears granularity
    responsibility). Gaps: L6 (no governance), L7 (minimal observability). Experimental status (v0.0.8). Complements: Policy
    engine wrapping external function dispatch for L6, structured logging middleware for L7. WARNING: in-process isolation
    — Rust memory safety bug = host compromise (different risk profile from hardware-isolated S:4 products)'
