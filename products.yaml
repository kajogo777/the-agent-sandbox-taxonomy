- name: Blaxel
  portability:
  - cloud-managed
  layers:
    L1:
      s: 4
      g: 1
      note: Firecracker microVM (same tech as AWS Lambda); root FS in memory; hardware-enforced tenant separation via KVM
    L2:
      s: 4
      g: 2
      note: Configurable memory (CPU proportional); TTL/expiration policies; 15-min max execution timeout; hypervisor-level
    L3:
      s: 4
      g: 1
      note: In-memory rootfs, wiped on destruction; full memory snapshots on standby; Zero Data Retention compliance
    L4:
      s: 1
      g: 1
      note: Blog claims hypervisor-enforced network isolation but API docs lack network policy config; conservative score
    L5:
      s: 3
      g: 3
      note: 'Placeholder substitution via MITM proxy: secrets defined per routing rule with {{SECRET:name}} syntax; proxy resolves
        secrets server-side before forwarding requests; sandbox runtime never sees raw secret values; secrets are write-only
        (stripped from API responses). S:3 — placeholder substitution: secrets swapped with tokens, restored at execution only
        by proxy. G:3 — per-destination scoped secrets with per-request resolution; different endpoints get different credentials;
        consistent with mechanism table (Placeholder substitution = S:3, G:3). WARNING:
        proxy enforcement depends on cooperative HTTP_PROXY env vars (L4:1) — processes bypassing the proxy cannot get secrets
        resolved but also cannot exfiltrate them via the proxy path. Feature in public preview (us-was-1 region only). Evidence:
        docs (Sandboxes/Proxy-secrets-injection)'
    L6:
      s: null
      g: null
      note: Deployment policies and model gateway with token cost control; not runtime command-level governance. Scored —
        (not addressed) because deployment-time policies are not runtime action governance — the sandbox itself does not restrict
        what the agent does at runtime
    L7:
      s: 2
      g: 2
      note: Auto-implemented logging and tracing; distributed tracing with spans; SOC 2 Type II, HIPAA, ISO 27001
  notes: 'Gaps: L4 (undocumented enforcement — proxy env vars are cooperative S:1), L6 (deployment-level only). L5 upgraded
    to S:3 via proxy placeholder substitution (public preview). Blog-to-docs gap on security features'
  last_reviewed: '2026-04-11'
  evidence_level: docs
  reviewed_by: null
