- name: just-bash
  portability:
  - any-os
  layers:
    L1:
      s: 0
      g: 0
      note: 'No OS-level isolation. Pure TypeScript bash interpreter running in-process within Node.js or browser. All commands
        execute as TypeScript functions — no process spawning, no containers, no VMs. Defense-in-Depth Box patches dangerous
        globals with Proxy objects (blocking Function, eval, setTimeout, process.env, process.binding, Module._load, WebAssembly,
        SharedArrayBuffer, etc.) — but this is application-level hardening within the same process, not a compute isolation
        boundary. S:0 — no isolation; agent code runs in same Node.js process as host application. G:0 — no isolation means
        no granularity. Evidence: source code (src/security/blocked-globals.ts, src/security/defense-in-depth-box.ts), README.
        README explicitly recommends Vercel Sandbox for full VM isolation'
    L2:
      s: 0
      g: 0
      note: 'In-process execution limits exist (maxCallDepth:100, maxCommandCount:10000, maxLoopIterations: 10000, maxStringLength:10MB,
        maxOutputSize:10MB, maxFileDescriptors:1024, timeouts via AbortSignal) but enforcement depends on L1 boundary (interpreter
        not being escaped). With L1:0, a prototype pollution or interpreter escape bypasses all limits. S:0 — no effective
        host resource enforcement; in-process limits are not host resource enforcement (cgroups, hypervisor). Consistent with
        Leash/Warden/packnplay which also score L2:0. G:0 — no effective granularity. Evidence: source code (src/limits.ts)'
    L3:
      s: 2
      g: 2
      note: 'Virtual filesystem with four implementations: InMemoryFs (default, complete isolation), OverlayFs (copy-on-write
        over real FS), ReadWriteFs (sandboxed real access), MountableFs (multi-mount). Path validation, symlink escape prevention
        (ELOOP detection), TOCTOU defense (O_NOFOLLOW), null byte rejection. S:2 — software-enforced: virtual FS layer that
        interpreted code cannot circumvent from within the interpreter; InMemoryFs provides complete host isolation; OverlayFs
        provides read-only host + COW writes. Not S:3 because enforcement is software-level within Node.js process, not kernel-level
        (no Landlock, no mount namespaces). G:2 — configurable per-mount read/write/read-only policies; MountableFs supports
        different FS types at different mount points. Evidence: source code (src/fs/), src/fs/cross-fs-security.test.ts (31+
        security scenarios)'
    L4:
      s: 2
      g: 3
      note: 'Network disabled by default (curl command not registered unless network config provided). When enabled: URL prefix
        allow-list with HTTP method restrictions, private IP blocking (SSRF protection covering IPv4 RFC 1918/loopback/link-local/CGNAT
        and IPv6 equivalents), DNS rebinding defense, redirect validation per-hop against allow-list, response size limits,
        header transforms for credential injection. S:2 — software-enforced: the interpreter has no raw socket capability
        (no socket module, no net module); the fetch wrapper is the only network path available; Defense-in-Depth Box blocks
        process.binding and process.dlopen which would be needed to access raw network. The agent cannot bypass the wrapper
        from within the interpreter. Comparable to Leash/Warden (S:2) where a separate process mediates all network — here
        the interpreter architecture mediates instead. Not S:3 because enforcement is application-level, not kernel-level.
        G:3 — content-aware: URL prefix matching (origin + path), HTTP method restrictions (default GET/HEAD only), header
        transforms inject/override credentials per-URL, redirect validation per-hop. Evidence: source code (src/network/fetch.ts,
        src/network/allow-list.ts), README'
    L5:
      s: 2
      g: 3
      note: 'Two credential modes: (1) env vars via BashOptions.env Map — visible inside interpreter (S:1 path); (2) header
        transforms — credentials set by host application and injected at the fetch wrapper boundary; sandbox code never sees
        credential values; firewall headers override user-supplied headers preventing substitution from inside; headers re-evaluated
        on each redirect so credentials never leaked to non-transform hosts. S:2 — software-enforced: header transforms provide
        credential isolation for network auth (in-process, not external proxy — compare Docker Sandbox S:4 which uses external
