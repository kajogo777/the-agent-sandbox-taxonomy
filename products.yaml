  reviewed_by: null
- name: nono
  portability:
  - linux
  - mac
  layers:
    L1:
      s: 3
      g: 1
      note: Landlock (Linux 5.13+) + Seatbelt (macOS); kernel-enforced process sandbox; irreversible once applied; seccomp-BPF
        for syscall interception; no root required; early alpha
    L2:
      s: null
      g: null
      note: ''
    L3:
      s: 3
      g: 2
      note: Default-deny; granular per-path read/write; sensitive paths blocked by default (~/.ssh, ~/.aws, shell configs,
        browser cookies); atomic rollback snapshots with integrity. G:2 — per-path rules are allowlist/blocklist, not content-aware
        (G:3 requires HTTP/body inspection)
    L4:
      s: 3
      g: 2
      note: Network blocked by default (--net-block); allowlist-based host filtering via local proxy; seccomp blocks raw socket
        creation; proxy enforcement outside sandbox
    L5:
      s: 3
      g: 3
      note: 'Two modes: (1) proxy injection — real credentials never enter sandbox; (2) env injection from OS keystore/1Password;
        phantom keys when access blocked. G:3 — proxy mechanism provides per-resource credential handling (per-service injection).
        Enforcement is external (proxy outside sandbox), not constrained by L1'
    L6:
      s: 3
      g: 2
      note: Destructive syscalls (unlink, rmdir) blocked at kernel level; seccomp-BPF supervisor intercepts syscalls; fd-injection
        after user approval; built-in audited profiles; dry-run mode
    L7:
      s: 3
      g: 3
      note: Sigstore cryptographic audit chain; DSSE envelopes with in-toto/SLSA attestations; keyed or keyless signing (OIDC
        + Fulcio + Rekor); instruction files cryptographically signed
  notes: 'ALL restrictions IRREVERSIBLE. Only gap is L2 (resource capping). Highest per-layer scores among all local-first
    tools. Complements: cgroups/ulimits wrapper for L2'
  last_reviewed: null
  evidence_level: docs
  reviewed_by: null
