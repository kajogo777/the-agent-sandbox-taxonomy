        <rect x="52" width="42" height="28" rx="4" fill="#059669" opacity="0.2" stroke="#34d399" stroke-width="1"/>
        <text x="73" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">4.2</text>
