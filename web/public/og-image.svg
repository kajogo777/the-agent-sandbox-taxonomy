        <text x="125" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">4.1</text>
        <rect x="156" width="42" height="28" rx="4" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
        <text x="177" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">1.1</text>
        <rect x="208" width="42" height="28" rx="4" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
        <text x="229" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">1.1</text>
        <rect x="260" width="42" height="28" rx="4" fill="#6b7280" opacity="0.15" stroke="#6b7280" stroke-width="1"/>
        <text x="281" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280">—</text>
