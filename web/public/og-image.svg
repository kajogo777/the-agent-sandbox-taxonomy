    <text x="70" y="28" text-anchor="middle" font-size="28" font-weight="800" fill="#34d399">26</text>
    <text x="70" y="50" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="500">Products Scored</text>

    <rect x="160" width="140" height="64" rx="8" fill="white" opacity="0.05"/>
    <rect x="160" width="140" height="64" rx="8" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
    <text x="230" y="28" text-anchor="middle" font-size="28" font-weight="800" fill="#818cf8">7</text>
    <text x="230" y="50" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="500">Defense Layers</text>

