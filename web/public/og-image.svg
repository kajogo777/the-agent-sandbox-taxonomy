      <g transform="translate(0, 24)">
        <circle cx="8" cy="8" r="7" fill="#059669"/>
        <text x="22" y="12" fill="#94a3b8">Addressed</text>
        <circle cx="108" cy="8" r="7" fill="none" stroke="#d97706" stroke-width="1.5"/>
        <path d="M 108,1 A 7,7 0 0,0 108,15 Z" fill="#d97706"/>
        <text x="122" y="12" fill="#94a3b8">Partial</text>
        <circle cx="198" cy="8" r="7" fill="none" stroke="#475569" stroke-width="1.5"/>
        <text x="212" y="12" fill="#94a3b8">Not addressed</text>
