  <rect x="80" y="80" width="90" height="36" rx="18" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <text x="125" y="103" text-anchor="middle" font-size="16" font-weight="700" fill="#a5b4fc" letter-spacing="3">7·7·3</text>

