      <rect x="0" y="22" width="12" height="12" rx="2" fill="#fca5a5" opacity="0.3" stroke="#fca5a5" stroke-width="1"/>
      <text x="18" y="32" fill="#94a3b8">0 None</text>
      <rect x="80" y="22" width="12" height="12" rx="2" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
