        <text x="21" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">4.1</text>
        <rect x="52" width="42" height="28" rx="4" fill="#059669" opacity="0.25" stroke="#34d399" stroke-width="1.5"/>
        <text x="73" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">4.2</text>
        <rect x="104" width="42" height="28" rx="4" fill="#059669" opacity="0.25" stroke="#34d399" stroke-width="1.5"/>
        <text x="125" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">4.2</text>
        <rect x="156" width="42" height="28" rx="4" fill="#3b82f6" opacity="0.2" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="177" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa">2.3</text>
        <rect x="208" width="42" height="28" rx="4" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="229" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">3.3</text>
        <rect x="260" width="42" height="28" rx="4" fill="#3b82f6" opacity="0.2" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="281" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa">2.3</text>
        <rect x="312" width="42" height="28" rx="4" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
